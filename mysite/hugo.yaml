baseURL: "https://kersov.com/"
languageCode: "en-gb"
title: "Chris Kersov"
theme: "hugo-xmin"
googleAnalytics: "G-6WJMWTQKKP"
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/post/:year/:month/:day/:slug/"

menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Education
      url: "/education/"
      weight: 2
    - name: Experience
      url: "/experience/"
      weight: 3
    - name: Projects
      url: "/projects/"
      weight: 4
    - name: Interests
      url: "/interests/"
      weight: 5

params:
  description: "Chris Kersov's personal website"
  footer: "[GitHub](https://github.com/chriskersov) [LinkedIn](https://www.linkedin.com/in/chriskersov/) [CV](/cv/)"

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - "\\["
              - "\\]"
            - - "$$"
              - "$$"
          inline:
            - - "\\("
              - "\\)"
